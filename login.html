<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — FazTicket</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .input-field {
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      border-color: #0055a9;
      box-shadow: 0 0 0 3px rgba(0, 85, 169, 0.12);
      outline: none;
    }
    .btn-login {
      transition: background 0.2s, transform 0.15s;
    }
    .btn-login:hover {
      background: #000;
    }
    .btn-login:active {
      transform: scale(0.98);
    }
    .card-glass {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
    }
    /* Tab indicator slide */
    .tab-indicator {
      transition: transform 0.3s ease;
    }
    /* Shake animation for wrong password */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    .shake {
      animation: shake 0.4s ease;
    }
    /* Fade in card */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up {
      animation: fadeUp 0.6s ease forwards;
    }
  </style>
</head>
<body class="min-h-screen hero-bg flex items-center justify-center px-4 py-10 relative">

  <div class="absolute inset-0 bg-[#0a2540]/70"></div>

  <div class="relative z-10 w-full max-w-md fade-up">

    <div class="text-center mb-6">
      <div class="inline-flex items-center gap-3 text-white">
        <span class="w-11 h-11 bg-[#0055a9] rounded-xl flex items-center justify-center text-xl shadow-lg">
          <i class="bi bi-triangle-half"></i>
        </span>
        <span class="text-3xl font-extrabold tracking-tight">FazTicket</span>
      </div>
      <p class="text-white/60 text-sm mt-2">Platform Tiket Pendakian Mojokerto</p>
    </div>

    <div class="card-glass rounded-2xl shadow-2xl overflow-hidden">

      <div class="relative flex bg-[#e8f2ff]">
        <div id="tabIndicator" class="tab-indicator absolute bottom-0 left-0 w-1/2 h-0.5 bg-[#0055a9]"></div>
        <button id="tabLogin" onclick="switchTab('login')"
          class="flex-1 py-4 text-sm font-bold text-[#0055a9] transition">
          Masuk
        </button>
        <button id="tabRegister" onclick="switchTab('register')"
          class="flex-1 py-4 text-sm font-bold text-gray-400 transition">
          Daftar
        </button>
      </div>

      <div id="formLogin" class="p-8">
        <h2 class="text-xl font-bold text-gray-800 mb-1">Selamat datang kembali!</h2>
        <p class="text-sm text-gray-400 mb-6">Masuk untuk memesan tiket pendakian</p>

        <div id="loginError" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-3 mb-4 flex items-center gap-2">
          <i class="bi bi-exclamation-circle-fill"></i>
          <span id="loginErrorMsg">Email atau password salah.</span>
        </div>

        <div class="mb-4">
          <label class="block text-sm font-semibold text-[#0055a9] mb-2">
            <i class="bi bi-envelope"></i> Email
          </label>
          <input id="loginEmail" type="email" placeholder="contoh@email.com"
            class="input-field w-full px-4 py-3 border-[1.5px] border-[#d4e3f5] rounded-xl bg-[#fafcff] text-gray-800 font-sans" />
        </div>

        <div class="mb-5 relative">
          <label class="block text-sm font-semibold text-[#0055a9] mb-2">
            <i class="bi bi-lock"></i> Password
          </label>
          <input id="loginPass" type="password" placeholder="Masukkan password"
            class="input-field w-full px-4 py-3 pr-12 border-[1.5px] border-[#d4e3f5] rounded-xl bg-[#fafcff] text-gray-800 font-sans" />
          <button type="button" onclick="togglePass('loginPass', 'eyeLogin')"
            class="absolute right-3 top-[42px] text-gray-400 hover:text-[#0055a9] transition text-lg">
            <i id="eyeLogin" class="bi bi-eye"></i>
          </button>
        </div>

        <div class="flex items-center justify-between mb-6 text-sm">
          <label class="flex items-center gap-2 text-gray-500 cursor-pointer">
            <input type="checkbox" id="rememberMe" class="accent-[#0055a9] w-4 h-4" />
            Ingat saya
          </label>
          <a href="#" class="text-[#0055a9] font-semibold hover:underline">Lupa password?</a>
        </div>

        <button onclick="handleLogin()"
          class="btn-login w-full bg-[#0055a9] text-white py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 text-sm">
          <i class="bi bi-box-arrow-in-right"></i> Masuk
        </button>

        <div class="relative my-5">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
          <div class="relative text-center"><span class="bg-white px-3 text-xs text-gray-400">atau</span></div>
        </div>

        <button onclick="loginAsGuest()"
          class="w-full border-[1.5px] border-[#d4e3f5] text-gray-500 hover:border-[#0055a9] hover:text-[#0055a9] py-3 rounded-xl font-semibold text-sm transition flex items-center justify-center gap-2">
          <i class="bi bi-person"></i> Lanjut sebagai Tamu
        </button>
      </div>

      <div id="formRegister" class="p-8 hidden">
        <h2 class="text-xl font-bold text-gray-800 mb-1">Buat akun baru</h2>
        <p class="text-sm text-gray-400 mb-6">Daftar gratis dan mulai pesan tiket</p>

        <div id="registerSuccess" class="hidden bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg px-4 py-3 mb-4 flex items-center gap-2">
          <i class="bi bi-check-circle-fill"></i>
          <span>Akun berhasil dibuat! Silakan masuk.</span>
        </div>

        <div class="mb-4">
          <label class="block text-sm font-semibold text-[#0055a9] mb-2">
            <i class="bi bi-person"></i> Nama Lengkap
          </label>
          <input id="regName" type="text" placeholder="Nama kamu"
            class="input-field w-full px-4 py-3 border-[1.5px] border-[#d4e3f5] rounded-xl bg-[#fafcff] text-gray-800 font-sans" />
        </div>

        <div class="mb-4">
          <label class="block text-sm font-semibold text-[#0055a9] mb-2">
            <i class="bi bi-envelope"></i> Email
          </label>
          <input id="regEmail" type="email" placeholder="contoh@email.com"
            class="input-field w-full px-4 py-3 border-[1.5px] border-[#d4e3f5] rounded-xl bg-[#fafcff] text-gray-800 font-sans" />
        </div>

        <div class="mb-5 relative">
          <label class="block text-sm font-semibold text-[#0055a9] mb-2">
            <i class="bi bi-lock"></i> Password
          </label>
          <input id="regPass" type="password" placeholder="Min. 6 karakter"
            class="input-field w-full px-4 py-3 pr-12 border-[1.5px] border-[#d4e3f5] rounded-xl bg-[#fafcff] text-gray-800 font-sans"
            oninput="checkStrength(this.value)" />
          <button type="button" onclick="togglePass('regPass', 'eyeReg')"
            class="absolute right-3 top-[42px] text-gray-400 hover:text-[#0055a9] transition text-lg">
            <i id="eyeReg" class="bi bi-eye"></i>
          </button>
          <!-- Password strength bar -->
          <div class="mt-2 h-1.5 rounded-full bg-gray-200 overflow-hidden">
            <div id="strengthBar" class="h-full rounded-full transition-all duration-300 w-0"></div>
          </div>
          <p id="strengthLabel" class="text-xs text-gray-400 mt-1"></p>
        </div>

        <button onclick="handleRegister()"
          class="btn-login w-full bg-[#0055a9] text-white py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 text-sm">
          <i class="bi bi-person-plus"></i> Buat Akun
        </button>
      </div>
    </div>

    <p class="text-center text-white/40 text-xs mt-5">© 2026 FazTicket. </p>
  </div>

  <script>
    // Tab switch
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('formLogin').classList.toggle('hidden', !isLogin);
      document.getElementById('formRegister').classList.toggle('hidden', isLogin);
      document.getElementById('tabLogin').className = `flex-1 py-4 text-sm font-bold transition ${isLogin ? 'text-[#0055a9]' : 'text-gray-400'}`;
      document.getElementById('tabRegister').className = `flex-1 py-4 text-sm font-bold transition ${!isLogin ? 'text-[#0055a9]' : 'text-gray-400'}`;
      document.getElementById('tabIndicator').style.transform = isLogin ? 'translateX(0)' : 'translateX(100%)';
    }

    function togglePass(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      icon.className = isPass ? 'bi bi-eye-slash' : 'bi bi-eye';
    }

    function checkStrength(val) {
      const bar = document.getElementById('strengthBar');
      const label = document.getElementById('strengthLabel');
      if (!val) { bar.style.width = '0'; label.textContent = ''; return; }
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const map = [
        { w: '20%', color: '#ef4444', text: 'Sangat lemah' },
        { w: '40%', color: '#f97316', text: 'Lemah' },
        { w: '60%', color: '#eab308', text: 'Sedang' },
        { w: '80%', color: '#22c55e', text: 'Kuat' },
        { w: '100%', color: '#16a34a', text: 'Sangat kuat' },
      ];
      const s = map[score - 1] || map[0];
      bar.style.width = s.w;
      bar.style.background = s.color;
      label.textContent = s.text;
      label.style.color = s.color;
    }

    const users = JSON.parse(localStorage.getItem('faz_users') || '[]');

    function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      const err = document.getElementById('loginError');
      const msg = document.getElementById('loginErrorMsg');
      const card = document.getElementById('formLogin');

      if (!email || !pass) {
        msg.textContent = 'Email dan password wajib diisi.';
        err.classList.remove('hidden');
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 400);
        return;
      }

      const user = users.find(u => u.email === email && u.pass === pass);
      if (!user) {
        msg.textContent = 'Email atau password salah.';
        err.classList.remove('hidden');
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 400);
        return;
      }

      if (document.getElementById('rememberMe').checked) {
        localStorage.setItem('faz_logged', JSON.stringify({ name: user.name, email: user.email }));
      } else {
        sessionStorage.setItem('faz_logged', JSON.stringify({ name: user.name, email: user.email }));
      }
      window.location.href = 'index.html';
    }

    function handleRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPass').value;

      if (!name || !email || !pass) { alert('Semua field wajib diisi.'); return; }
      if (pass.length < 6) { alert('Password minimal 6 karakter.'); return; }
      if (users.find(u => u.email === email)) { alert('Email sudah terdaftar.'); return; }

      users.push({ name, email, pass });
      localStorage.setItem('faz_users', JSON.stringify(users));
      document.getElementById('registerSuccess').classList.remove('hidden');
      setTimeout(() => {
        document.getElementById('registerSuccess').classList.add('hidden');
        switchTab('login');
        document.getElementById('loginEmail').value = email;
      }, 1500);
    }

    function loginAsGuest() {
      sessionStorage.setItem('faz_logged', JSON.stringify({ name: 'Tamu', email: '' }));
      window.location.href = 'index.html';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (!document.getElementById('formLogin').classList.contains('hidden')) handleLogin();
      else handleRegister();
    });

    if (localStorage.getItem('faz_logged') || sessionStorage.getItem('faz_logged')) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
